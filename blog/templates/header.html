<header
      class="bg-brand-green dark:bg-gray-900 backdrop-blur-sm sticky top-0 z-50 shadow-md"
    >
      <nav
        class="container mx-auto px-6 py-3 flex justify-between items-center max-w-screen-xl"
      >
        <a href="/index.html" class="block">
          <img
            src="/images/logo_narbos.webp"
            alt="Logo de Narbo's Salón Spa"
            class="h-14 w-auto"
          />
        </a>

        <div class="hidden md:flex items-center space-x-8">
          <a
            href="/index.html#inicio"
            class="text-white dark:text-gray-200 hover:text-brand-medium dark:hover:text-brand-medium active:text-brand-medium dark:active:text-brand-medium"

            href="/index.html#servicios"
            class="text-white dark:text-gray-200 hover:text-brand-medium dark:hover:text-brand-medium active:text-brand-medium dark:active:text-brand-medium"

          <a
            href="/index.html#galeria"
            class="text-white dark:text-gray-200 hover:text-brand-medium dark:hover:text-brand-medium active:text-brand-medium dark:active:text-brand-medium"
            >Galería</a
          >
          <a
            href="/index.html#resenas"
            class="text-white dark:text-gray-200 hover:text-brand-medium dark:hover:text-brand-medium active:text-brand-medium dark:active:text-brand-medium"
            >Reseñas</a
          >
          <a
            href="/index.html#ubicacion"
            class="text-white dark:text-gray-200 hover:text-brand-medium dark:hover:text-brand-medium active:text-brand-medium dark:active:text-brand-medium"

          <a

          >

          <div
            class="ml-4 border-l border-gray-300/50 dark:border-gray-600 pl-4 flex items-center space-x-4"
          >
            <button
              id="theme-toggle"
              type="button"
              aria-label="Cambiar tema de color"
              class="text-brand-light dark:text-gray-400 hover:bg-white/20 dark:hover:bg-gray-700 focus:outline-none focus:ring-4 focus:ring-brand-light dark:focus:ring-gray-700 rounded-lg text-sm p-2.5"
            >
              <svg
                id="theme-toggle-dark-icon"
                class="hidden w-5 h-5"
                stroke="currentColor"
                viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                fill="none"
              >
                <path
                  d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"
                ></path>
              </svg>
              <svg
                id="theme-toggle-light-icon"
                class="hidden w-5 h-5"
                stroke="currentColor"
                viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                fill="none"
              >
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>

            id="theme-toggle-mobile"
            type="button"
            aria-label="Cambiar tema de color"
            class="text-brand-light dark:text-gray-400 hover:bg-white/20 dark:hover:bg-gray-700 focus:outline-none focus:ring-4 focus:ring-brand-light dark:focus:ring-gray-700 rounded-lg text-sm p-2.5 mr-2"
          >
            <svg
              id="theme-toggle-dark-icon-mobile"
              class="hidden w-5 h-5"
              stroke="currentColor"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              fill="none"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <svg
              id="theme-toggle-light-icon-mobile"
              class="hidden w-5 h-5"

              xmlns="http://www.w3.org/2000/svg"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              fill="none"

              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
          </button>
          <button
            id="menu-btn"
            aria-label="Abrir menú de navegación"
            class="text-white dark:text-gray-200 focus:outline-none z-50"
          >
            <svg
              id="menu-open-icon"
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6h16M4 12h16m-7 6h7"
              ></path>
            </svg>
            <svg
              id="menu-close-icon"
              class="w-6 h-6 hidden"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              ></path>
