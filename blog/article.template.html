<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Google Tag Manager / Analytics -->
    <meta name="google-site-verification" content="z7iMcq4xUxxKeXpDsVU32HJ_a0jXCwyOFmZi-7vvCKs" />

    <!-- SEO MASTER START -->
    <title>{{TITLE}} | Narbo's Salón Spa</title>
    <meta id="meta-description" name="description" content="{{DESCRIPTION}}" />
    <link rel="canonical" href="https://narbossalon.com/blog/articles/{{SLUG}}" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="article" />
    <meta property="og:url" content="https://narbossalon.com/blog/articles/{{SLUG}}" />
    <meta property="og:title" content="{{TITLE}} | Narbo's Salón Spa" />
    <meta property="og:description" content="{{DESCRIPTION}}" />
    <meta property="og:image" content="https://narbossalon.com/{{IMAGE_PATH}}" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://narbossalon.com/blog/articles/{{SLUG}}" />
    <meta property="twitter:title" content="{{TITLE}} | Narbo's Salón Spa" />
    <meta property="twitter:description" content="{{DESCRIPTION}}" />
    <meta property="twitter:image" content="https://narbossalon.com/{{IMAGE_PATH}}" />
    
    <!-- Robots: This will be replaced by JSON-LD Schema in production articles -->
    <meta name="robots" content="noindex, nofollow" />
    <!-- SEO MASTER END -->

    <link rel="stylesheet" href="../../css/styles.css?v=2.4.0" />
    <link rel="icon" type="image/webp" href="../../images/brand/favicon_narbos.webp" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Optimización de Fuentes y CSS Externos -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" media="print" onload="this.media='all'">
    
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    </noscript>

    <style>
        /* Optimización de CLS y Estilos Base */
        #navbar-root { min-height: 80px; }
        #breadcrumbs-root { min-height: 48px; }
        .prose h2 { margin-top: 2rem; margin-bottom: 1rem; }
        .prose p { margin-bottom: 1.5rem; line-height: 1.8; }
    </style>
</head>
  <body class="font-sans bg-white text-slate-800">
    <header class="site-header">
      <div id="navbar-root"></div>
    </header>

    <div id="app-wrapper" class="relative w-full overflow-x-hidden">
      <!-- Breadcrumbs -->
      <div id="breadcrumbs-root"></div>

      <main class="pb-16 md:pb-24 pt-8 md:pt-12">
        <div class="container mx-auto px-6 max-w-screen-md">
          <article>
            <header class="text-center mb-12 animate__animated animate__fadeIn">
              <h1 class="text-4xl md:text-5xl font-serif font-bold text-gray-900 mt-4 mb-6 leading-tight"
                   data-breadcrumb="{{BREADCRUMB_TITLE}}">
                {{TITLE}}
              </h1>
              <p class="text-lg text-gray-600">
                <span>Por el equipo de Narbo's Salón Spa</span>
                • <span>{{DATE}}</span>
              </p>
              
              <!-- Botón de Compartir -->
              <div class="share-button-container mt-6 flex justify-center" 
                   data-title="{{TITLE}} | Narbo's Salón Spa" 
                   data-text="{{DESCRIPTION}}"></div>
            </header>

            <img
              src="{{IMAGE_PATH}}"
              alt="{{IMAGE_ALT}}"
              class="w-full max-w-lg mx-auto rounded-2xl shadow-xl mb-12 animate__animated animate__fadeInUp"
              style="animation-delay: 0.2s"
              loading="eager"
            />

            <div class="prose lg:prose-xl max-w-none text-gray-800">
              
              <!-- Tabla de Contenidos -->
              {{TOC}}

              <!-- CONTENIDO DEL ARTÍCULO -->
              <div class="article-body">
                {{ARTICLE_CONTENT}}
              </div>
              
              <!-- CTA de agendamiento -->
              <div class="text-center mt-12 animate__animated animate__zoomIn">
                <a
                  href="https://wa.me/573123462618?text=Hola%2C%20le%C3%AD%20su%20art%C3%ADculo%20sobre%20{{TITLE}}%20y%20quiero%20agendar%20una%20cita."
                  class="inline-block bg-brand-green text-white font-bold py-4 px-10 rounded-full shadow-lg transform hover:scale-105 transition-all duration-300 ease-in-out"
                  >Agenda tu cita y asesoría personalizada 📲</a>
              </div>

              <!-- FAQ SECTION -->
              {{FAQ_SECTION}}
            </div>
          </article>

          <div class="text-center mt-16 border-t pt-8">
            <a href="/blog/" class="text-brand-green font-semibold hover:underline font-serif">&larr; Volver al blog</a>
          </div>
        </div>
      </main>

      <div id="footer-root"></div>
    </div> <!-- End app-wrapper -->

    <script src="../../js/main.js?v=2.4.0" type="module"></script>
  </body>
</html>
